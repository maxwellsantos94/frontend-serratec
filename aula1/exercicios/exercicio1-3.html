<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Game HTML</title>
  </head>
  <body>
    <!-- Cabeçalho -->
    <header>
      <header style="background-color: #ddd; padding: 10px">
      <h1>Game Mode</h1>
    </header>

    <!-- Conteúdo principal -->
    <main>
      <p>Hello Everyone.</p>

      <p>
        Este é o segundo parágrafo com um
        <strong><em>texto em negrito e itálico</em></strong>
      </p>

      <p>
        Acesse o
        <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">Google</a>
      </p>

      <div style="background-color: lightblue">
        Esta é uma div com cor de fundo.
      </div>

      <div>
        Esta é uma div,
        <span style="color: red">
          e este é um span dentro de uma div com cor em vermelho
        </span>
      </div>
    </main>

    <!-- Rodapé -->
    <footer style="background-color: #ddd; padding: 10px; margin-top: 20px;">
      <p>© 2026 - Meu site</p>
    </footer>
  </body>
</html>
